# Prometheus Configuration
# Observability stack for Agent World

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: agent-world
    replica: '{{.ExternalURL}}'

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # Self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # OpenTelemetry Collector
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888', 'otel-collector:8889']
    scrape_interval: 10s

  # Agent World Backend
  - job_name: 'agent-world-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Adapter Instances
  - job_name: 'adapter'
    static_configs:
      - targets:
        - 'adapter-1:8000'
        - 'adapter-2:8000'
        - 'adapter-3:8000'
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 15s

  # PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 15s

  # Nginx
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
    scrape_interval: 15s

# Remote write for long-term storage (optional)
# remote_write:
#   - url: http://cortex:9009/api/prom/push
