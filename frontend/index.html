<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #050a14;
            color: #e0e1dd;
            font-family: 'Rajdhani', 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* Cyberpunk UI Overlay */
        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        
        .panel {
            background: rgba(10, 22, 40, 0.95);
            border: 1px solid #00f3ff;
            border-radius: 8px;
            padding: 20px;
            pointer-events: auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
        }
        
        .panel h2 {
            font-family: 'Orbitron', monospace;
            color: #00f3ff;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        /* Top Bar */
        #top-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            color: #00f3ff;
            text-shadow: 0 0 20px #00f3ff;
            letter-spacing: 5px;
        }
        
        .stats {
            display: flex;
            gap: 30px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #ff006e;
            text-shadow: 0 0 10px #ff006e;
        }
        
        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7fb3d5;
        }
        
        /* Agent Panel (Right Side) */
        #agent-panel {
            position: fixed;
            right: 20px;
            top: 100px;
            width: 320px;
            max-height: calc(100vh - 140px);
            overflow-y: auto;
            display: none;
        }
        
        #agent-panel.active {
            display: block;
        }
        
        .agent-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .agent-info h3 {
            color: #fff;
            margin-bottom: 5px;
        }
        
        .agent-role {
            color: #7fb3d5;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        
        .status-idle { background: rgba(0, 255, 0, 0.2); color: #39ff14; border: 1px solid #39ff14; }
        .status-working { background: rgba(255, 166, 0, 0.2); color: #ffa500; border: 1px solid #ffa500; }
        .status-paused { background: rgba(255, 0, 0, 0.2); color: #ff4444; border: 1px solid #ff4444; }
        
        .progress-bar {
            height: 6px;
            background: #1a1c2c;
            border-radius: 3px;
            margin: 15px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00f3ff, #ff006e);
            transition: width 0.3s;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }
        
        .logs {
            max-height: 200px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
        }
        
        .log-entry {
            padding: 8px 0;
            border-left: 2px solid #00f3ff;
            padding-left: 12px;
            margin: 5px 0;
            color: #7fb3d5;
        }
        
        .log-time {
            color: #ff006e;
            font-size: 10px;
        }
        
        /* Control Buttons */
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn {
            flex: 1;
            padding: 12px;
            border: 1px solid #00f3ff;
            background: transparent;
            color: #00f3ff;
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 4px;
        }
        
        .btn:hover {
            background: #00f3ff;
            color: #050a14;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }
        
        .btn-secondary {
            border-color: #ff006e;
            color: #ff006e;
        }
        
        .btn-secondary:hover {
            background: #ff006e;
            color: #fff;
        }
        
        /* Room List (Left Side) */
        #room-list {
            position: fixed;
            left: 20px;
            top: 100px;
            width: 200px;
        }
        
        .room-item {
            padding: 15px;
            margin: 10px 0;
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(10, 22, 40, 0.5);
        }
        
        .room-item:hover {
            border-color: #00f3ff;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }
        
        .room-name {
            font-weight: bold;
            color: #fff;
        }
        
        .room-agents {
            font-size: 11px;
            color: #7fb3d5;
            margin-top: 5px;
        }
        
        /* Create Agent Button */
        #create-agent-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #00f3ff;
            background: rgba(0, 243, 255, 0.1);
            color: #00f3ff;
            font-size: 30px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #create-agent-btn:hover {
            background: #00f3ff;
            color: #050a14;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.6);
            transform: scale(1.1);
        }
        
        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 10, 20, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            width: 400px;
        }
        
        .form-group {
            margin: 15px 0;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #7fb3d5;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: #1a1c2c;
            border: 1px solid #00f3ff;
            border-radius: 4px;
            color: #fff;
            font-family: inherit;
        }
        
        /* Scanline Effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 50;
            opacity: 0.3;
        }
        
        /* Loading Screen */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050a14;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        
        .loading-text {
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            color: #00f3ff;
            letter-spacing: 5px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .hidden {
            display: none !important;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading">
        <div class="loading-text">INITIALIZING AGENT WORLD...</div>
    </div>
    
    <!-- 3D Canvas -->
    <div id="canvas-container"></div>
    
    <!-- Scanline Overlay -->
    <div class="scanlines"></div>
    
    <!-- UI Layer -->
    <div id="ui-layer">
        <!-- Top Bar -->
        <div id="top-bar">
            <div class="logo">◆ AGENT WORLD</div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="stat-agents">0</div>
                    <div class="stat-label">Active Agents</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="stat-tasks">0</div>
                    <div class="stat-label">Tasks Done</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="stat-rooms">0</div>
                    <div class="stat-label">Rooms</div>
                </div>
            </div>
        </div>
        
        <!-- Room List -->
        <div id="room-list" class="panel">
            <h2>◆ Locations</h2>
            <div id="rooms-container"></div>
        </div>
        
        <!-- Agent Detail Panel -->
        <div id="agent-panel" class="panel">
            <div class="agent-avatar" id="agent-avatar">🤖</div>
            <div class="agent-info">
                <h3 id="agent-name">Select an Agent</h3>
                <div class="agent-role" id="agent-role">-</div>
                <div class="status-badge" id="agent-status">IDLE</div>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="agent-progress" style="width: 0%"></div>
            </div>
            
            <div class="logs" id="agent-logs"></div>
            
            <div class="controls">
                <button class="btn" onclick="assignTask()">Assign Task</button>
                <button class="btn btn-secondary" onclick="pauseAgent()">Pause</button>
            </div>
        </div>
        
        <!-- Create Agent Button -->
        <button id="create-agent-btn" onclick="openModal()">+</button>
    </div>
    
    <!-- Create Agent Modal -->
    <div id="modal" class="modal">
        <div class="modal-content panel">
            <h2>◆ Spawn New Agent</h2>
            <div class="form-group">
                <label>Agent Name</label>
                <input type="text" id="new-agent-name" placeholder="Agent 4">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="new-agent-role">
                    <option value="Researcher">Researcher</option>
                    <option value="Designer">Designer</option>
                    <option value="Writer">Writer</option>
                    <option value="Analyst">Analyst</option>
                    <option value="Developer">Developer</option>
                </select>
            </div>
            <div class="controls">
                <button class="btn" onclick="createAgent()">Spawn</button>
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>
    
    <!-- Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="workflow_panel.js"></script>
    <script src="game.js"></script>
</body>
</html>
