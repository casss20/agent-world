name: CI/CD Pipeline

on:
  push:
    branches: [ main, arch/v2-multi-agent-platform ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx
      
      - name: Run tests
        run: |
          cd backend
          python -m pytest test_*.py -v --tb=short || true
      
      - name: Security scan
        run: |
          pip install bandit safety
          bandit -r backend -f json -o bandit-report.json || true
          safety check || true

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Debug - List files
        run: |
          echo "=== Repository structure ==="
          ls -la
          echo "=== Backend directory ==="
          ls -la backend/
          echo "=== Dockerfile location ==="
          find . -name "Dockerfile" -type f
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/arch/v2-multi-agent-platform'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to staging
        run: |
          echo "Deploying to staging..."
          # In production, use SSH or kubectl
          # ssh user@staging-server "cd /app && docker-compose pull && docker-compose up -d"
      
      - name: Smoke tests
        run: |
          sleep 10
          curl -f http://staging.agentverse.local/stateless/health || exit 1
          curl -f http://staging.agentverse.local/metrics || exit 1

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Record pre-deploy state
        run: |
          echo "DEPLOY_START=$(date -u +%Y%m%d_%H%M%S)" >> $GITHUB_ENV
          echo "PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1)" >> $GITHUB_ENV
      
      - name: Deploy to production (blue-green)
        run: |
          echo "Deploying to production..."
          # Blue-green deployment
          # docker-compose -f docker-compose.prod.yml up -d --no-deps --scale adapter=6
          # sleep 30
          # docker-compose -f docker-compose.prod.yml up -d --no-deps --scale adapter=3
      
      - name: Post-deploy health check
        run: |
          sleep 10
          for i in {1..5}; do
            curl -f http://localhost:8080/stateless/health && break
            sleep 5
          done
      
      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deployment successful"
          # curl -X POST $SLACK_WEBHOOK -d '{"text":"Deployment successful"}'
      
      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Deployment failed, rolling back..."
          git checkout ${{ env.PREVIOUS_TAG }}
          # docker-compose -f docker-compose.prod.yml pull
          # docker-compose -f docker-compose.prod.yml up -d
          echo "Rolled back to ${{ env.PREVIOUS_TAG }}"
