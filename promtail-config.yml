# Promtail Configuration
# Log collector for Loki

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'logstream'
      - source_labels: ['__meta_docker_container_label_logging']
        target_label: 'logging'

  # Agent World backend logs
  - job_name: agent-world
    static_configs:
      - targets:
          - localhost
        labels:
          job: agent-world
          __path__: /var/log/agent-world/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            trace_id: trace_id
            span_id: span_id
            agent_id: agent_id
            business_id: business_id
            room_id: room_id
            task_id: task_id
            event_type: event_type
      - labels:
          level:
          trace_id:
          agent_id:
          business_id:
          event_type:
