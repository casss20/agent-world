# AlertManager Configuration
# Ticket 2: Alerting
# Routes alerts to appropriate channels

global:
  smtp_smarthost: 'localhost:587'
  smmtp_from: 'alerts@agentverse.local'
  
  # Slack webhook (configure with real URL)
  slack_api_url: '${SLACK_WEBHOOK_URL}'

# Templates for alert formatting
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route alerts based on severity
route:
  group_by: ['alertname', 'severity', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  
  routes:
    # Critical alerts → Pager/Slack immediately
    - match:
        severity: critical
      receiver: 'pager'
      continue: true
    
    # Warning alerts → Slack only
    - match:
        severity: warning
      receiver: 'slack'
      continue: false
    
    # All alerts → Email digest
    - receiver: 'email'
      group_wait: 1m
      group_interval: 15m

# Receivers (notification channels)
receivers:
  - name: 'default'
    slack_configs:
      - channel: '#alerts'
        title: 'AgentVerse Alert'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        
  - name: 'pager'
    slack_configs:
      - channel: '#pager-duty'
        title: '🚨 CRITICAL: AgentVerse'
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          Runbook: {{ .Annotations.runbook_url }}
          {{ end }}
        send_resolved: true
    
  - name: 'slack'
    slack_configs:
      - channel: '#warnings'
        title: '⚠️ AgentVerse Warning'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        send_resolved: true
  
  - name: 'email'
    email_configs:
      - to: 'ops@agentverse.local'
        subject: 'AgentVerse Alert: {{ .GroupLabels.alertname }}'
        body: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Instance: {{ .Labels.instance }}
          Severity: {{ .Labels.severity }}
          Runbook: {{ .Annotations.runbook_url }}
          {{ end }}

# Inhibit alerts (don't spam if higher severity exists)
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
