version: '3.8'

services:
  # Redis for shared state
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Adapter instances (3 for production)
  adapter:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io/casss20}/agent-world:${IMAGE_TAG:-latest}
    restart: always
    environment:
      - INSTANCE_ID=instance_${HOSTNAME}
      - ADAPTER_PORT=8000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_password}
      - USE_REAL_CHATDEV=${USE_REAL_CHATDEV:-false}
      - JWT_SECRET=${JWT_SECRET}
      - CHATDEV_API_URL=${CHATDEV_API_URL:-http://chatdev:8000}
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: pause
        order: stop-first
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/stateless/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Nginx load balancer
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - adapter

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  # AlertManager for alerts
  alertmanager:
    image: prom/alertmanager:latest
    restart: always
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # Camofox Browser - Anti-detection browser server
  camofox:
    build:
      context: ../camofox-browser
      dockerfile: Dockerfile
    image: camofox-browser:latest
    restart: always
    environment:
      - CAMOFOX_PORT=9377
      - MAX_SESSIONS=50
      - MAX_TABS_PER_SESSION=10
      - SESSION_TIMEOUT_MS=1800000
      - BROWSER_IDLE_TIMEOUT_MS=300000
      - PROXY_HOST=${PROXY_HOST:-}
      - PROXY_PORT=${PROXY_PORT:-}
      - PROXY_USERNAME=${PROXY_USERNAME:-}
      - PROXY_PASSWORD=${PROXY_PASSWORD:-}
      - CAMOFOX_API_KEY=${CAMOFOX_API_KEY:-}
    volumes:
      - camofox_cookies:/home/node/.camofox/cookies
    ports:
      - "9377:9377"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9377/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Multica PostgreSQL
  multica-postgres:
    image: pgvector/pgvector:pg17
    restart: always
    environment:
      POSTGRES_DB: multica
      POSTGRES_USER: ${MULTICA_POSTGRES_USER:-multica}
      POSTGRES_PASSWORD: ${MULTICA_POSTGRES_PASSWORD:-multica}
    volumes:
      - multica_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multica"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Multica Backend - Agent orchestration
  multica:
    build:
      context: ../multica
      dockerfile: Dockerfile
    image: multica:latest
    restart: always
    environment:
      - DATABASE_URL=postgres://${MULTICA_POSTGRES_USER:-multica}:${MULTICA_POSTGRES_PASSWORD:-multica}@multica-postgres:5432/multica?sslmode=disable
      - PORT=8081
      - JWT_SECRET=${MULTICA_JWT_SECRET:-multica_jwt_secret}
    ports:
      - "8081:8081"
    depends_on:
      multica-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  redis_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  camofox_cookies:
  multica_pgdata:
