# Load Balancer Configuration - Phase 4
# Includes: Adapter, Camofox Browser, Multica

events {
    worker_connections 1024;
}

http {
    # Upstream: Adapter instances
    upstream stateless_adapter {
        least_conn;
        
        server 127.0.0.1:8004 weight=3;
        server 127.0.0.1:8005 weight=2;
        server 127.0.0.1:8006 weight=2;
        
        keepalive 32;
    }

    # Upstream: Camofox Browser
    upstream camofox {
        server 127.0.0.1:9377;
        keepalive 16;
    }

    # Upstream: Multica
    upstream multica {
        server 127.0.0.1:8081;
        keepalive 16;
    }

    server {
        listen 8080;
        server_name localhost;
        
        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Adapter: Stateless API
        location /stateless/ {
            proxy_pass http://stateless_adapter;
            proxy_http_version 1.1;
            
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $http_x_correlation_id;
            
            proxy_set_header Connection "";
        }
        
        # Adapter: WebSocket
        location /ws/ {
            proxy_pass http://stateless_adapter;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
        
        # Camofox Browser API
        location /camofox/ {
            proxy_pass http://camofox/;
            proxy_http_version 1.1;
            
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for camofox
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;
        }
        
        # Multica API
        location /multica/ {
            proxy_pass http://multica/;
            proxy_http_version 1.1;
            
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_set_header Connection "";
        }
        
        # Nginx status
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }
    }
}
