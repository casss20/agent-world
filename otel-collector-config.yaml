# OpenTelemetry Collector Configuration
# Receives OTLP, exports to Prometheus, Tempo, and Loki

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  # Add resource attributes
  resource:
    attributes:
      - key: environment
        value: production
        action: upsert

  # Filter out health checks
  filter/healthcheck:
    metrics:
      exclude:
        match_type: regexp
        metric_names:
          - .*health.*
          - .*live.*
          - .*ready.*

exporters:
  # Prometheus (metrics)
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true

  # Tempo (traces)
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Loki (logs)
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    tls:
      insecure: true
    labels:
      attributes:
        agent_id: agent_id
        business_id: business_id
        room_id: room_id
        task_id: task_id
        event_type: event_type

  # Debug output (for development)
  logging:
    loglevel: debug

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    # Traces pipeline
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp/tempo, logging]
    
    # Metrics pipeline
    metrics:
      receivers: [otlp]
      processors: [batch, resource, filter/healthcheck]
      exporters: [prometheusremotewrite, logging]
    
    # Logs pipeline
    logs:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [loki, logging]
